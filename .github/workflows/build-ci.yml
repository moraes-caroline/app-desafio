name: API CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Security Audit
        run: npm audit --audit-level=high || true

      - name: Run Tests
        run: npm test

      - name: Build API
        run: npm run build

      - name: Validate Files
        run: |
          test -f server.js
          test -f package.json
          test -f Dockerfile

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: api